<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>My Skill Swap | Learn and Exchange Skills Online</title>
  <meta name="title" content="My Skill Swap | Learn and Exchange Skills Online" />
  <meta name="description"

  <meta name="robots" content="index, follow" />

  <meta name="twitter:description" content="Learn new skills and teach others using the My Skill Swap platform." />
  <meta name="twitter:image" content="/logo.png" />
